apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nvr-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/server-alias: "production"
spec:
  ingressClassName: nginx
  rules:
  - host: "nvr-production.local"
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
