# ── AUTH SERVICE ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: 954377119665.dkr.ecr.eu-north-1.amazonaws.com/nvr/auth-service:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: nvr-config
        - secretRef:
            name: nvr-secrets
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "500m", memory: "512Mi" }
        livenessProbe:
          httpGet: { path: /health, port: 3001 }
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 3001 }
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: nvr
spec:
  selector:
    app: auth-service
  ports:
  - port: 3001
    targetPort: 3001
---
